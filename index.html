<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ShopNest Ecommerce</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Navbar -->

  <header class="navbar">

    <div class="logo">
      Shop<span>Nest</span>
    </div>

    <nav>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Categories</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <button class="cart-btn">
      Cart (<span id="cart-count">0</span>)
    </button>

  </header>

  <!-- Hero Section -->

  <section class="hero">

    <div class="hero-content">

      <h1>Discover Amazing Products</h1>

      <p>
        Upgrade your lifestyle with premium fashion,
        electronics, accessories, and more.
      </p>

      <button class="shop-btn">
        Shop Now
      </button>

    </div>

  </section>

  <!-- Product Section -->

  <section class="products">

    <h2>Featured Products</h2>

    <div class="product-grid">

      <!-- Product 1 -->

      <div class="product-card">

        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1170&auto=format&fit=crop" alt="Shoes">

        <h3>Running Shoes</h3>

        <p>$120</p>

        <button class="add-cart">
          Add to Cart
        </button>

      </div>

      <!-- Product 2 -->

      <div class="product-card">

        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1170&auto=format&fit=crop" alt="Phone">

        <h3>Smart Phone</h3>

        <p>$899</p>

        <button class="add-cart">
          Add to Cart
        </button>

      </div>

      <!-- Product 3 -->

      <div class="product-card">

        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1179&auto=format&fit=crop" alt="Watch">

        <h3>Smart Watch</h3>

        <p>$299</p>

        <button class="add-cart">
          Add to Cart
        </button>

      </div>

    </div>

  </section>

  <!-- Footer -->

  <footer class="footer">

    <p>
      © 2026 ShopNest Ecommerce Website
    </p>

  </footer>

  <script src="script.js"></script>

</body>
</html>
